services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-ledger-postgres
    restart: unless-stopped
    environment:
      # 可通过同目录 .env 覆盖以下默认值。
      POSTGRES_DB: ${POSTGRES_DB:-ai_ledger}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
    name: ai_ledger_postgres_data
