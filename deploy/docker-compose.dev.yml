services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-ledger-postgres-dev
    restart: unless-stopped
    environment:
      # 数据库基础参数由服务端 `.env` 统一注入。
      POSTGRES_DB: ${POSTGRES_DB:-ai_ledger}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - 5432:5432
    networks:
      - ai-ledger-net-dev

volumes:
  postgres_data_dev:
    name: ai_ledger_postgres_data_dev

networks:
  ai-ledger-net-dev:
    name: ai-ledger-net-dev