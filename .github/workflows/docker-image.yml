name: 构建并推送 Docker 镜像

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  # 镜像仓库统一使用 GHCR。
  REGISTRY: ghcr.io

jobs:
  build-server:
    name: 构建后端镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # `type=gha` 缓存依赖 buildx 的 docker-container 驱动。
          driver: docker-container

      - name: 规范化命名空间
        id: namespace
        shell: bash
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成后端标签
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.namespace.outputs.owner_lc }}/ai-ledger-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag

      - name: 构建并推送后端镜像
        uses: docker/build-push-action@v6
        with:
          context: ai-ledger-server
          file: ai-ledger-server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ai-ledger-server
          cache-to: type=gha,mode=max,scope=ai-ledger-server

  build-frontend:
    name: 构建前端镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # `type=gha` 缓存依赖 buildx 的 docker-container 驱动。
          driver: docker-container

      - name: 规范化命名空间
        id: namespace
        shell: bash
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成前端标签
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.namespace.outputs.owner_lc }}/ai-ledger-frontend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag

      - name: 构建并推送前端镜像
        uses: docker/build-push-action@v6
        with:
          context: ai-ledger-frontend
          file: ai-ledger-frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=/api
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ai-ledger-frontend
          cache-to: type=gha,mode=max,scope=ai-ledger-frontend
